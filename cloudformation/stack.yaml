AWSTemplateFormatVersion: "2010-09-09"
Description: >
  cloudformation stack for the autoscaling demo — MontyIIT, us-east-1, 2026-02-28.
  creates everything in one go: iam role, security group, a baseline ec2 instance,
  a launch template, and an asg with cpu-based scaling.
  you can override any of the parameters below at deploy time instead of
  editing this file directly.

# override these at deploy time with --parameter-overrides if you need to
# change the ami, instance size, your ssh ip, etc.
Parameters:

  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0f3caa1cf4417e51b
    Description: Amazon Linux 2023 in us-east-1. Worth checking for a newer one before deploying.

  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues: [t2.micro, t3.micro, t3.small, t3.medium]
    Description: t2.micro covers free tier. bump to t3.small if you're doing anything real.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: my-ec2-keypair
    Description: has to already exist in the account before you run this stack.

  AdminIp:
    Type: String
    Default: 205.254.163.5/32
    Description: your current public IP — only this address can SSH in. update it if your IP changes.

  VolumeSize:
    Type: Number
    Default: 20
    MinValue: 8
    MaxValue: 100
    Description: root volume in GiB. 20 is plenty for this use case.

  AsgMin:
    Type: Number
    Default: 1
    Description: floor — the asg won't go below this even when idle.

  AsgDesired:
    Type: Number
    Default: 2
    Description: where the asg starts and tries to return to at steady state.

  AsgMax:
    Type: Number
    Default: 5
    Description: ceiling — caps how many instances can run to avoid surprise bills.

  CpuTarget:
    Type: Number
    Default: 70
    Description: average cpu % to aim for. 70 is a reasonable middle ground.

Resources:

  # iam role — read-only s3, cloudwatch metrics, ssm session manager.
  # keeping it minimal so a compromised instance can't do much damage.
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2-ReadOnly-Role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Project
          Value: AutoScalingDemo

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: EC2-ReadOnly-Role
      Roles:
        - !Ref EC2InstanceRole

  # security group — ssh from your ip only, http/https open to everyone
  WebAppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: web-app-sg
      GroupDescription: Firewall for web application EC2 instances
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminIp
          Description: SSH — admin IP only
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP — public
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS — public
      Tags:
        - Key: Name
          Value: web-app-sg
        - Key: Project
          Value: AutoScalingDemo

  # a single baseline instance just to verify the setup works.
  # the asg fleet is separate — this one's mainly for manual testing.
  WebAppInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref WebAppSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e
          dnf update -y
          dnf install -y nginx amazon-cloudwatch-agent
          systemctl enable nginx
          systemctl start nginx
          echo "<h1>web-app-vm is running</h1>" > /usr/share/nginx/html/index.html
      Tags:
        - Key: Name
          Value: web-app-vm
        - Key: Environment
          Value: Production
        - Key: Project
          Value: AutoScalingDemo

  # launch template — locks in the config so all asg instances come out identical
  WebAppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: web-app-launch-template
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        IamInstanceProfile:
          Name: EC2-ReadOnly-Role
        SecurityGroupIds:
          - !Ref WebAppSecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref VolumeSize
              VolumeType: gp3
              DeleteOnTermination: true
        UserData:
          Fn::Base64: |
            #!/bin/bash
            set -e
            dnf update -y
            dnf install -y nginx amazon-cloudwatch-agent
            systemctl enable nginx
            systemctl start nginx
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: web-app-asg-instance
              - Key: Environment
                Value: Production
              - Key: ManagedBy
                Value: AutoScaling

  # asg — spreads instances across all three AZs, terminates oldest first
  WebAppASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: web-app-asg
      LaunchTemplate:
        LaunchTemplateId: !Ref WebAppLaunchTemplate
        Version: !GetAtt WebAppLaunchTemplate.LatestVersionNumber
      MinSize: !Ref AsgMin
      MaxSize: !Ref AsgMax
      DesiredCapacity: !Ref AsgDesired
      AvailabilityZones:
        - us-east-1a
        - us-east-1b
        - us-east-1c
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
      TerminationPolicies:
        - OldestInstance
      Tags:
        - Key: Name
          Value: web-app-asg
          PropagateAtLaunch: true
        - Key: Environment
          Value: Production
          PropagateAtLaunch: true

  # target tracking policy — aws figures out how many instances to add/remove.
  # also auto-creates the cloudwatch alarms, no need to manage those manually.
  CpuScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WebAppASG
      PolicyName: scale-out-cpu
      PolicyType: TargetTrackingScaling
      EstimatedInstanceWarmup: 300
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: !Ref CpuTarget
        DisableScaleIn: false

# useful ids/arns you can grab with:
#   aws cloudformation describe-stacks --stack-name <name> --query 'Stacks[0].Outputs'
Outputs:

  InstanceId:
    Description: EC2 instance ID of the baseline web-app-vm
    Value: !Ref WebAppInstance
    Export:
      Name: !Sub "${AWS::StackName}-InstanceId"

  SecurityGroupId:
    Description: ID of the web-app-sg security group
    Value: !Ref WebAppSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SecurityGroupId"

  LaunchTemplateId:
    Description: ID of the web-app-launch-template
    Value: !Ref WebAppLaunchTemplate
    Export:
      Name: !Sub "${AWS::StackName}-LaunchTemplateId"

  IamRoleArn:
    Description: ARN of the EC2-ReadOnly-Role
    Value: !GetAtt EC2InstanceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-IamRoleArn"

  AutoScalingGroupName:
    Description: Name of the Auto Scaling Group
    Value: !Ref WebAppASG
    Export:
      Name: !Sub "${AWS::StackName}-ASGName"
